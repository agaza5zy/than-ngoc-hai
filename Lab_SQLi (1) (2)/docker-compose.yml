services: 
  db-server:
    image: mysql:8.0
    env_file: 
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  web-app:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8080:8000"
    volumes:
      - .:/code
    env_file: 
      - .env
    depends_on:
      - db-server 