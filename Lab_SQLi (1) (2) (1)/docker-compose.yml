services: 
  db-server:
    image: mysql:8.0
    env_file: 
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  waf:
    image: owasp/modsecurity-crs:nginx
    ports:
      - "80:8080"
    environment:
      - MODSEC_RULE_ENGINE=On
      - BACKEND=http://web-app:8000
    volumes:
      - ./my_sqli_rules.conf:/etc/modsecurity.d/owasp-crs/rules/RESPONSE-999-EXCLUSIONS.conf
    depends_on:
      - web-app
  web-app:
    build: .
    restart: on-failure
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8080:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - db-server