{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám Phá Hình Nền</title>
    <link rel="stylesheet" href="{% static 'style2.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <header class="navbar">
            <div class="logo">NHOM 7 <span>SQL LAB</span></div>
            <nav class="nav-links">
                <a href="?category=phone">Phone</a>
                <a href="?category=laptop">Laptop</a>
                <a href="?category=4k">4K Quality</a>
            </nav>
            <div class="user-profile">
                <a href="{% url 'logout' %}" style="color: white; text-decoration: none;">Logout</a>
            </div>
        </header>

        <main class="container">
            <h1 class="main-title">Khám phá hình nền chất lượng cao</h1>
            
            <div class="search-wrapper">
                <form class="search-box" method="GET" action="{% url 'search' %}">
                    <input type="text" name="q" placeholder="Tìm kiếm hình nền...">
                    <button type="submit" class="btn-search">
                        <i class="fas fa-search"></i> Tìm kiếm
                    </button>
                </form>
            </div>

            <div class="gallery-grid">
                {% for wallpaper in wallpapers %}
                <div class="image-card">
                    <img src="/static/{{ wallpaper.image_path }}" alt="{{ wallpaper.title }}" style="width:200px; border-radius: 10px;">
                    
                    <p class="image-title" style="color: white; margin-top: 10px; font-weight: bold; font-size: 14px;">
                        {{ wallpaper.title }}
                    </p>
                </div>
                {% empty %}
                <p style="color: white;">Không tìm thấy hình nền nào phù hợp.</p>
                {% endfor %}
            </div>
        </main>
    </div>
</body>
</html>
