<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Học tập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">E-Learning</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-item nav-link fw-bold text-warning" href="{% url 'chatbot' %}"> Chatbot AI</a>
                {% if user.is_authenticated %}
                    <span class="nav-item nav-link">Xin chào, <b>{{ user.username }}</b></span>
                    <a class="nav-item nav-link btn btn-danger text-white btn-sm ms-2" href="{% url 'logout' %}">Đăng xuất</a>
                {% else %}
                    <a class="nav-item nav-link" href="{% url 'login' %}">Đăng nhập</a>
                    <a class="nav-item nav-link" href="{% url 'register' %}">Đăng ký</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
