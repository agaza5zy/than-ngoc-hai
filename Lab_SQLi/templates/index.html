<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  Khám Phá</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <header class="navbar">
            <div class="logo">NHOM 7 <span>SQL LAB</span></div>
            <nav class="nav-links">
                <a href="#">Phone</a>
                <a href="#">Laptop</a>
                <a href="#">4K Quality</a>
            </nav>
            <div class="user-profile">Logout</div>
        </header>

        <main class="container">
            <h1 class="main-title">Khám phá hình nền chất lượng cao</h1>
            
            <div class="search-wrapper">
                <div class="search-box">
                    <input type="text" placeholder="Tìm kiếm hình nền (ví dụ: Cyberpunk, Nature...)">
                    <button class="btn-search">
                        <i class="fas fa-search"></i> Tìm kiếm
                    </button>
                </div>
            </div>

            <div class="gallery-grid">
                <div class="image-card">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b" alt="Landscape">
                </div>
                <div class="image-card">
                    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" alt="Mountain">
                </div>
            </div>
        </main>
    </div>
</body>
</html>
