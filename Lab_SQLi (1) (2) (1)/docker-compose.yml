services: 
  db-server:
    image: mysql:8.0
    env_file: 
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  web-app:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8080:8000"
    volumes:
      - .:/code
    env_file: 
      - .env
    depends_on:
      - db-server 
  waf:
    image: owasp/modsecurity-crs:nginx
    ports:
    - "80:8080"
    environment:
    - BACKEND=http://web-app:8000
    depends_on:
    - web-app
