{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận mật khẩu mới</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="background-container">
        <div class="login-box">
            <h2>New Password</h2>
            <p style="margin-bottom: 25px; font-size: 0.9rem; color: rgba(255,255,255,0.8);">
                Vui lòng nhập mật khẩu mới của bạn bên dưới.
            </p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="input-group">
                    <input type="password" name="password" placeholder="New password" required>
                </div>
                <div class="input-group">
                    <input type="password" name="confirm_password" placeholder="Confirm new password" required>
                </div>

                <button type="submit" class="login-btn" style="margin-top: 10px;">Reset Password</button>

                {% if error %}
                <p style="color: #ff6b6b; font-size: 0.8rem; margin-top: 10px;">{{ error }}</p>
                {% endif %}

                <div class="register-link">
                    <a href="{% url 'login' %}">Back to Login</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
